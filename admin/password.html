<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>관리자 비밀번호 확인</title>
  <link rel="stylesheet" href="/assets/style.css?v=20260706-navstrong2">
</head>
<body>
  <main class="admin-wrap">
    <section class="admin-card">
      <h1>관리자 비밀번호 확인</h1>
      <p>글쓰기와 게시판 수정은 관리자 비밀번호 확인 후 이용할 수 있습니다.</p>
      <form id="passwordForm">
        <div class="form-row">
          <label class="label" for="password">비밀번호</label>
          <input class="input" id="password" name="password" type="password" autocomplete="current-password" autofocus placeholder="관리자 비밀번호를 입력하세요" required>
        </div>
        <button id="submitBtn" class="btn btn-primary" type="submit">확인하기</button>
        <a class="btn btn-light" href="/ab-qna/">목록으로</a>
      </form>
      <div id="status" class="status" role="status"></div>
    </section>
  </main>
  <script>
    const form = document.getElementById('passwordForm');
    const statusEl = document.getElementById('status');
    const passwordInput = document.getElementById('password');
    const params = new URLSearchParams(location.search);
    const next = params.get('next') || '/admin/write.html';
    const safeNext = next.startsWith('/') && !next.startsWith('//') ? next : '/admin/write.html';
    document.getElementById('submitBtn').textContent = (safeNext.includes('board-edit') || safeNext.includes('edit-post')) ? '확인하고 수정하기' : '확인하고 글쓰기';
    window.addEventListener('DOMContentLoaded', () => passwordInput.focus());
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      statusEl.className = 'status';
      statusEl.textContent = '비밀번호를 확인하는 중입니다.';
      try {
        const password = document.getElementById('password').value;
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password }) });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.message || '비밀번호가 맞지 않습니다.');
        localStorage.setItem('notice_admin_token', data.token);
        statusEl.className = 'status ok';
        statusEl.textContent = '확인되었습니다. 이동합니다.';
        location.href = safeNext;
      } catch (error) {
        statusEl.className = 'status err';
        statusEl.textContent = error.message;
      }
    });
  </script>
</body>
</html>
