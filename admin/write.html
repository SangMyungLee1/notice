<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>게시글 작성</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main class="admin-wrap">
    <section class="admin-card wide">
      <h1>게시글 작성</h1>
      <p>이미지는 제목 입력칸보다 위에 있는 버튼으로 먼저 업로드할 수 있습니다. 저장할 때 메타 설명, OG 설명, 구조화 데이터, 이미지 alt/title/caption은 게시글별로 자동 생성됩니다.</p>

      <div class="form-row">
        <button id="openImageModal" class="btn btn-primary" type="button">이미지 추가</button>
        <button id="logoutBtn" class="btn btn-light" type="button">나가기</button>
      </div>

      <form id="postForm">
        <div class="form-row">
          <label class="label" for="boardSelect">게시판 선택</label>
          <select class="input" id="boardSelect" required>
            <option value="free">자유게시판</option>
            <option value="moving">포장이사 게시판</option>
            <option value="internet">인터넷가입 게시판</option>
            <option value="water">정수기렌탈 게시판</option>
            <option value="rentcar">렌트카 게시판</option>
          </select>
        </div>
        <div class="form-row">
          <label class="label" for="title">제목</label>
          <input class="input" id="title" type="text" maxlength="90" placeholder="게시글 제목을 입력하세요" required>
        </div>

        <div class="form-row">
          <label class="label" for="editor">내용</label>
          <div class="editor-toolbar">
            <button class="btn btn-light" type="button" id="addLinkBtn">URL</button>
            <button class="btn btn-light" type="button" data-command="bold">굵게</button>
            <button class="btn btn-light" type="button" data-command="insertUnorderedList">목록</button>
            <button class="btn btn-light" type="button" id="addSubTitle">소제목</button>
            <button class="btn btn-primary" type="button" id="topSaveBtn">저장하기</button>
          </div>
          <div id="editor" class="editor" contenteditable="true" data-placeholder="여기에 내용을 입력하세요. 이미지 추가 버튼으로 올린 이미지는 본문에 자동 삽입됩니다."></div>
        </div>

        <button class="btn btn-primary" type="submit">저장하기</button>
        <a class="btn btn-light" href="/ab-qna/">목록 보기</a>
        <div id="saveStatus" class="status" role="status"></div>
      </form>
    </section>
  </main>


  <div id="imageModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle">이미지 업로드</h2>
        <button id="closeImageModal" class="btn btn-light" type="button">닫기</button>
      </div>
      <label id="dropZone" class="drop-zone" for="imageInput">
        <strong>이곳에 이미지를 끌어다 놓으세요</strong>
        <span>또는 클릭해서 이미지 파일을 선택하세요.</span>
        <input id="imageInput" type="file" accept="image/*" multiple>
      </label>
      <div id="uploadStatus" class="status"></div>
      <div id="previewList" class="preview-list"></div>
    </div>
  </div>

  <script>
    const tokenKey = 'notice_admin_token';
    const token = () => localStorage.getItem(tokenKey) || '';
    const editor = document.getElementById('editor');
    const imageModal = document.getElementById('imageModal');
    const openImageModal = document.getElementById('openImageModal');
    const closeImageModal = document.getElementById('closeImageModal');
    const dropZone = document.getElementById('dropZone');
    const imageInput = document.getElementById('imageInput');
    const uploadStatus = document.getElementById('uploadStatus');
    const previewList = document.getElementById('previewList');
    const saveStatus = document.getElementById('saveStatus');
    const topSaveBtn = document.getElementById('topSaveBtn');
    const submitButton = document.querySelector('#postForm button[type="submit"]');
    const saveButtons = [submitButton, topSaveBtn].filter(Boolean);
    let selectedImage = null;
    let savedRange = null;
    const writeParams = new URLSearchParams(location.search);
    const requestedBoard = writeParams.get('board');
    if (requestedBoard && document.getElementById('boardSelect')) document.getElementById('boardSelect').value = requestedBoard;

    function lockEditorScrollBox() {
      editor.style.height = '600px';
      editor.style.minHeight = '600px';
      editor.style.maxHeight = '600px';
      editor.style.overflowY = 'scroll';
      editor.style.overflowX = 'auto';
    }
    lockEditorScrollBox();

    try {
      document.execCommand('defaultParagraphSeparator', false, 'div');
    } catch (_) {}

    async function verifySession() {
      try {
        const res = await fetch('/api/verify', {
          headers: { Authorization: `Bearer ${token()}` }
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error('인증 필요');
      } catch (_) {
        localStorage.removeItem(tokenKey);
        location.replace('/admin/password.html');
      }
    }

    verifySession();

    function rememberSelection() {
      const selection = window.getSelection();
      if (!selection || !selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      if (editor.contains(range.commonAncestorContainer)) savedRange = range.cloneRange();
    }

    editor.addEventListener('mouseup', rememberSelection);
    editor.addEventListener('keyup', rememberSelection);
    editor.addEventListener('focus', rememberSelection);
    document.addEventListener('selectionchange', () => {
      if (document.activeElement === editor) rememberSelection();
    });

    editor.addEventListener('click', (event) => {
      const img = event.target.closest ? event.target.closest('img') : null;
      if (selectedImage && selectedImage !== img) selectedImage.classList.remove('selected-editor-image');
      selectedImage = img && editor.contains(img) ? img : null;
      if (selectedImage) {
        selectedImage.classList.add('selected-editor-image');
        const range = document.createRange();
        range.selectNode(selectedImage);
        savedRange = range.cloneRange();
      }
    });

    function restoreSelection() {
      const selection = window.getSelection();
      if (!selection || !savedRange) return false;
      selection.removeAllRanges();
      selection.addRange(savedRange);
      return true;
    }

    function normalizeUrl(url) {
      url = String(url || '').trim();
      if (!url) return '';
      if (/^(https?:)?\/\//i.test(url) || /^mailto:/i.test(url) || /^tel:/i.test(url)) return url;
      return 'https://' + url;
    }

    function applyLinkToSelectedImage(url) {
      if (!selectedImage || !editor.contains(selectedImage)) return false;
      const existingLink = selectedImage.closest('a');
      if (existingLink && editor.contains(existingLink)) {
        existingLink.setAttribute('href', url);
        existingLink.setAttribute('target', '_blank');
        existingLink.setAttribute('rel', 'noopener noreferrer');
        return true;
      }
      const link = document.createElement('a');
      link.href = url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      selectedImage.parentNode.insertBefore(link, selectedImage);
      link.appendChild(selectedImage);
      return true;
    }

    function normalizeEditorLinks() {
      editor.querySelectorAll('a[href]').forEach((a) => {
        const href = normalizeUrl(a.getAttribute('href'));
        if (href) a.setAttribute('href', href);
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      });
    }

    document.getElementById('addLinkBtn').addEventListener('click', () => {
      const url = normalizeUrl(prompt('연결할 URL을 입력하세요.'));
      if (!url) return;
      if (applyLinkToSelectedImage(url)) {
        normalizeEditorLinks();
        editor.focus();
        return;
      }
      editor.focus();
      restoreSelection();
      const selection = window.getSelection();
      if (!selection || selection.isCollapsed) {
        alert('링크를 걸 텍스트나 이미지를 먼저 선택하세요.');
        return;
      }
      document.execCommand('createLink', false, url);
      normalizeEditorLinks();
      rememberSelection();
    });

    topSaveBtn.addEventListener('click', () => {
      document.getElementById('postForm').requestSubmit();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem(tokenKey);
      location.href = '/';
    });

    document.querySelectorAll('[data-command]').forEach((btn) => {
      btn.addEventListener('click', () => {
        editor.focus();
        document.execCommand(btn.dataset.command, false, null);
      });
    });

    document.getElementById('addSubTitle').addEventListener('click', () => {
      editor.focus();
      document.execCommand('formatBlock', false, 'h2');
    });

    function resetImageModal() {
      uploadStatus.className = 'status';
      uploadStatus.textContent = '';
      previewList.innerHTML = '';
      imageInput.value = '';
      dropZone.classList.remove('dragover');
    }

    openImageModal.addEventListener('click', () => {
      resetImageModal();
      imageModal.classList.add('active');
      imageModal.setAttribute('aria-hidden', 'false');
    });

    function closeModal() {
      imageModal.classList.remove('active');
      imageModal.setAttribute('aria-hidden', 'true');
    }
    closeImageModal.addEventListener('click', closeModal);
    imageModal.addEventListener('click', (event) => {
      if (event.target === imageModal) closeModal();
    });

    ['dragenter', 'dragover'].forEach((name) => {
      dropZone.addEventListener(name, (event) => {
        event.preventDefault();
        dropZone.classList.add('dragover');
      });
    });
    ['dragleave', 'drop'].forEach((name) => {
      dropZone.addEventListener(name, (event) => {
        event.preventDefault();
        dropZone.classList.remove('dragover');
      });
    });
    dropZone.addEventListener('drop', (event) => {
      uploadFiles(Array.from(event.dataTransfer.files || []));
    });
    imageInput.addEventListener('change', () => {
      uploadFiles(Array.from(imageInput.files || []));
      imageInput.value = '';
    });

    async function uploadFiles(files) {
      const images = files.filter(file => file.type.startsWith('image/'));
      if (!images.length) {
        uploadStatus.className = 'status err';
        uploadStatus.textContent = '이미지 파일만 업로드할 수 있습니다.';
        return;
      }

      uploadStatus.className = 'status';
      uploadStatus.textContent = images.length + '장 이미지 업로드 중입니다.';
      let successCount = 0;

      for (const file of images) {
        const uploaded = await uploadOne(file);
        if (uploaded) successCount += 1;
      }

      if (successCount === images.length) {
        uploadStatus.className = 'status ok';
        closeModal();
        resetImageModal();
      }
    }


    async function convertImageToWebp(file) {
      if (file.type === 'image/webp') return file;
      if (!/^image\/(jpeg|jpg|png)$/i.test(file.type)) {
        throw new Error('JPG, PNG, WebP 이미지만 업로드할 수 있습니다.');
      }
      const bitmap = await createImageBitmap(file);
      const canvas = document.createElement('canvas');
      canvas.width = bitmap.width;
      canvas.height = bitmap.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(bitmap, 0, 0);
      if (bitmap.close) bitmap.close();
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/webp', 0.82));
      if (!blob) throw new Error('이미지를 WebP로 변환하지 못했습니다.');
      const baseName = file.name.replace(/\.[^.]+$/, '').replace(/[^a-zA-Z0-9가-힣_-]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '') || 'image';
      return new File([blob], baseName + '.webp', { type: 'image/webp' });
    }

    async function uploadOne(file) {
      const localPreviewUrl = URL.createObjectURL(file);
      const item = document.createElement('div');
      item.className = 'preview-item';
      const thumb = document.createElement('img');
      thumb.src = localPreviewUrl;
      const text = document.createElement('span');
      text.textContent = '업로드 중...';
      item.append(thumb, text);
      previewList.appendChild(item);

      try {
        const webpFile = await convertImageToWebp(file);
        if (webpFile.size > 5 * 1024 * 1024) throw new Error('WebP 변환 후 이미지가 5MB를 넘습니다. 더 작은 이미지를 올려주세요.');
        const formData = new FormData();
        formData.append('image', webpFile);
        const res = await fetch('/api/upload-image', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token()}` },
          body: formData
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.message || '이미지 업로드에 실패했습니다.');

        text.textContent = 'WebP 업로드 완료';
        insertImage(data.url, data.alt || '', data.url);
        return true;
      } catch (error) {
        text.textContent = '업로드 실패';
        uploadStatus.className = 'status err';
        uploadStatus.textContent = error.message;
        URL.revokeObjectURL(localPreviewUrl);
        return false;
      }
    }

    function insertImage(url, alt, previewUrl) {
      editor.focus();
      const html = `<figure class="image-figure"><img src="${escapeAttr(previewUrl || url)}" data-upload-src="${escapeAttr(url)}" alt="${escapeAttr(alt || '')}"></figure><p><br></p>`;
      document.execCommand('insertHTML', false, html);
      requestAnimationFrame(() => { editor.scrollTop = editor.scrollHeight; });
    }

    function getContentHtmlForSave() {
      const clone = editor.cloneNode(true);
      clone.querySelectorAll('img[data-upload-src]').forEach((img) => {
        img.setAttribute('src', img.getAttribute('data-upload-src'));
        img.removeAttribute('data-upload-src');
      });
      clone.querySelectorAll('.selected-editor-image').forEach((img) => img.classList.remove('selected-editor-image'));
      clone.querySelectorAll('a[href]').forEach((a) => {
        const href = normalizeUrl(a.getAttribute('href'));
        if (href) a.setAttribute('href', href);
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      });
      clone.querySelectorAll('figcaption').forEach((node) => node.remove());
      return clone.innerHTML.trim();
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/'/g, '&#39;'); }

    document.getElementById('postForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const title = document.getElementById('title').value.trim();
      const contentHtml = getContentHtmlForSave();
      if (!title) return setSaveStatus('제목을 입력하세요.', 'err');
      if (!contentHtml || contentHtml === '<br>') return setSaveStatus('내용을 입력하세요.', 'err');

      setSaveStatus('', '');
      saveButtons.forEach((button) => button.disabled = true);
      try {
        const res = await fetch('/api/create-post', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token()}`
          },
          body: JSON.stringify({ title, contentHtml, board: document.getElementById('boardSelect').value })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.message || '저장에 실패했습니다.');
        const plainText = editor.innerText.trim();
        rememberPendingPost({
          id: data.id,
          title,
          slug: data.slug || (data.path ? data.path.split('/').pop() : ''),
          path: data.path,
          board: data.board || document.getElementById('boardSelect').value,
          boardName: data.boardName || '',
          createdAt: data.createdAt || new Date().toISOString(),
          excerpt: data.excerpt || plainText.slice(0, 135),
          searchText: data.searchText || plainText,
          savedAtMs: Date.now()
        });
        setSaveStatus('', '');
        location.href = '/' + (data.boardPath || 'ab-qna') + '/?fresh=' + encodeURIComponent(data.id || Date.now());
      } catch (error) {
        saveButtons.forEach((button) => button.disabled = false);
        setSaveStatus(error.message, 'err');
      }
    });

    function rememberPendingPost(post) {
      if (!post || !post.path) return;
      try {
        const key = 'notice_pending_posts';
        const current = JSON.parse(localStorage.getItem(key) || '[]');
        const rows = Array.isArray(current) ? current : [];
        const next = [post].concat(rows.filter((item) => String(item.id || item.path) !== String(post.id || post.path)));
        localStorage.setItem(key, JSON.stringify(next.slice(0, 20)));
      } catch (_) {}
    }

    function setSaveStatus(message, type) {
      saveStatus.className = `status ${type || ''}`;
      saveStatus.textContent = message;
    }
  </script>
</body>
</html>
